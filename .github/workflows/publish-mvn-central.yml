name: Publish to Maven Central

on:
  release:
    types: [published]
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:        
  publish_maven:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' # Adjust to your Java version if needed
          distribution: 'temurin'
          server-id: central 
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

          # --- DIAGNOSTIC STEP ---
      - name: Verify Secrets are Loaded
        env:
          U: ${{ secrets.OSSRH_USER }}
          P: ${{ secrets.OSSRH_TOKEN }}
        run: |
          echo "Username length: ${#U}"
          echo "Token length: ${#P}"
          if [ -z "$U" ] || [ -z "$P" ]; then
            echo "::error::Secrets are empty! Check your repository settings."
            exit 1
          fi


      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Release trigger: use the tag version
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch or other triggers: use SNAPSHOT version with run number
            echo "version=1.0.0-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Update version in pom.xml
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Publish package to Maven Central
        env:
          # Mapping your specific GitHub Secrets to the variables Maven expects
          OSSRH_USER: ${{ secrets.OSSRH_USER }} 
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }} 
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # 2. Run the deploy command, passing the GPG passphrase directly
          mvn clean deploy -B -DskipTests -Dgpg.passphrase="${GPG_PASSPHRASE}"
